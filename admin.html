<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — V.V Imports</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <div class="header-inner">

    <a href="index.html" class="logo">
      <img src="logo.jpg" class="logo-img">
    </a>

    <nav class="nav">
      <a class="nav-link" href="index.html">Início</a>
      <a class="nav-link" href="loja.html">Loja</a>
      <a class="nav-link" href="admin.html">Admin</a>
    </nav>

  </div>
</header>

<section class="page-admin">

  <div class="admin-card">

    <h1>Painel Admin</h1>

    <form id="productForm" class="form-card">

      <label>Imagem</label>
      <input type="file" id="productImage" required>

      <img id="imagePreview" style="display:none;max-width:200px;margin-top:10px">

      <label>Nome</label>
      <input type="text" id="productName" required>

      <label>Marca</label>
      <input type="text" id="productBrand">

      <label>Categoria</label>
      <input type="text" id="productCategory">

      <label>Descrição</label>
      <input type="text" id="productDescription">

      <label>Preço</label>
      <input type="number" id="productPrice" required>

      <label>Promoção</label>
      <input type="text" id="productPromo">

      <!-- ⭐ NOVO -->
      <label style="display:flex;gap:10px;align-items:center;">
        <input type="checkbox" id="productDestaque">
        Marcar como destaque
      </label>

      <button class="btn-buy" type="submit">
        SALVAR PRODUTO
      </button>

    </form>

  </div>

</section>

<section class="section">
  <div class="section-inner">

    <h2 class="section-title">PRODUTOS</h2>

    <div class="products-grid" id="adminProducts"></div>

  </div>
</section>

<script src="script.js"></script>

</body>
</html>
