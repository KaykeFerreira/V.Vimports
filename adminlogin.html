<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — VC Imports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <div class="logo-circle">
        <span class="logo-vc">VC</span>
        <span class="logo-imp">IMPORTS</span>
      </div>
    </a>
    <nav class="nav">
      <a class="nav-link" href="index.html">Início</a>
      <a class="nav-link" href="loja.html">Loja</a>
    </nav>
  </div>
</header>

<!-- LOGIN -->
<div class="page-login">
  <div class="login-card">
    <h1>🔐 ÁREA ADMIN</h1>
    <p>Acesso restrito. Insira suas credenciais.</p>

    <div class="login-error" id="loginError">
      Usuário ou senha incorretos. Tente novamente.
    </div>

    <form id="adminLoginForm">
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" id="adminUser" placeholder="admin" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="adminPass" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button class="btn-buy" type="submit" style="margin-top:10px">ENTRAR</button>
    </form>

    <p style="margin-top:20px;color:#555;font-size:13px;text-align:center">
      Credenciais padrão: <strong>admin</strong> / <strong>vcimports2025</strong><br>
      <em>(altere no arquivo script.js antes de publicar)</em>
    </p>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
