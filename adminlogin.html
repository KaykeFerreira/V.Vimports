<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — V.V Imports</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <img src="logo.jpg" class="logo-img">
    </a>

    <nav class="nav">
      <a class="nav-link" href="index.html">Início</a>
      <a class="nav-link" href="loja.html">Loja</a>
    </nav>
  </div>
</header>

<section class="page-login">

  <div class="login-card">

    <h1>🔐 ADMIN</h1>
    <p>Acesso restrito</p>

    <div class="login-error" id="loginError">
      Usuário ou senha inválidos
    </div>

    <form id="adminLoginForm">

      <div class="form-group">
        <label>Usuário</label>
        <input type="text" id="adminUser" required>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="adminPass" required>
      </div>

      <button class="btn-buy" type="submit">
        ENTRAR
      </button>

    </form>

    <p style="text-align:center;margin-top:20px;color:#777;font-size:13px">
      admin / vvimports2025
    </p>

  </div>

</section>

<div class="toast" id="toast"></div>

<script src="script.js"></script>

</body>
</html>
